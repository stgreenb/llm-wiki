# llm-wiki configuration
tool: logseq          # logseq or obsidian
wiki_path: ~/Documents/MyWiki/
pages_dir: pages      # relative to wiki_path
memory_path: ~/.claude/projects/my-project/memory/
namespaces:
  - Business
  - Tech
  - Content
  - Projects
  - People
  - Learning
  - Reference

# Agents configured for this wiki (auto-detected by setup.sh)
# Possible values: claude, opencode
agents:
  - claude
  - opencode
